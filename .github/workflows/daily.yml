name: Daily AI Video

on:
  schedule:
    - cron: '0 3 * * *'  # 10:00 WIB
    - cron: '0 9 * * *'  # 16:00 WIB
    - cron: '0 15 * * *' # 22:00 WIB
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_B64 }}" | base64 -d > token_v5.json

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python -m src.pipeline_ai

      - name: Commit refreshed token (if changed)
        run: |
          if git diff --quiet token_v5.json 2>/dev/null; then
            echo "Token unchanged"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add token_v5.json
            git commit -m "auto: refresh YouTube token"
            git push
          fi
