name: Generate & Upload TikTok

on:
  workflow_dispatch:
    inputs:
      tiktok_only:
        description: 'Only upload to TikTok (Skip YouTube)'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Create .env file
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          python -c "
          import os, json
          secrets = json.loads(os.environ['ALL_SECRETS'])
          with open('.env', 'w') as f:
              for k, v in secrets.items():
                  if k.startswith('GROQ_API_KEY') or k.startswith('PEXELS_API_KEY') or k in ['ELEVENLABS_API_KEYS']:
                      v_escaped = v.replace('\n', '\\n')
                      f.write(f'{k}=\"{v_escaped}\"\n')
          "

      - name: Create TikTok Cookies
        run: |
          echo "${{ secrets.TIKTOK_COOKIES }}" > tiktok_cookies.txt

      - name: Create YouTube credentials (Optional)
        if: inputs.tiktok_only == false
        env:
          Y_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          Y_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -n "$Y_SECRET" ]; then
            echo "$Y_SECRET" > client_secret.json
            echo "$Y_TOKEN" > token_default.json
          fi

      - name: Run Pipeline
        run: |
          if [ "${{ inputs.tiktok_only }}" = "true" ]; then
            python -m src.pipeline --tiktok-only
          else
            python -m src.pipeline
          fi
