name: Generate & Upload TikTok

on:
  workflow_dispatch:
    inputs:
      tiktok_only:
        description: 'Only upload to TikTok (Skip YouTube)'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Create .env file
        run: |
          cat << EOF > .env
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEYS=${{ secrets.ELEVENLABS_API_KEYS }}
          EOF

      - name: Create TikTok Cookies
        run: |
          echo "${{ secrets.TIKTOK_COOKIES }}" > tiktok_cookies.txt

      - name: Create YouTube credentials (Optional)
        if: inputs.tiktok_only == false
        env:
          Y_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          Y_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -n "$Y_SECRET" ]; then
            echo "$Y_SECRET" > client_secret.json
            echo "$Y_TOKEN" > token_default.json
          fi

      - name: Run Pipeline
        run: |
          if [ "${{ inputs.tiktok_only }}" = "true" ]; then
            python -m src.pipeline --tiktok-only
          else
            python -m src.pipeline
          fi
